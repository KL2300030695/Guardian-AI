version: '3.8'

services:
  guardian-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardian_ai_server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistent data mounts
      - guardian_database:/app/GuardianAI/database
      - guardian_recordings:/app/GuardianAI/recordings
      - guardian_screenshots:/app/GuardianAI/screenshots
      - guardian_faces:/app/GuardianAI/faces
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  guardian_database:
  guardian_recordings:
  guardian_screenshots:
  guardian_faces:
